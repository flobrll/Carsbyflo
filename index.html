<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florian Barall - Automotive Photography Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #333;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        .portfolio {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .portfolio img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
        }
        .contact {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Florian Barall</h1>
        <p>Automotive Photographer</p>
    </header>
    <main>
        <div class="portfolio">
            <img src="https://via.placeholder.com/300x200.png?text=Car+Image+1" alt="Car Image 1">
            <img src="https://via.placeholder.com/300x200.png?text=Car+Image+2" alt="Car Image 2">
            <img src="https://via.placeholder.com/300x200.png?text=Car+Image+3" alt="Car Image 3">
            <img src="https://via.placeholder.com/300x200.png?text=Car+Image+4" alt="Car Image 4">
            <img src="https://via.placeholder.com/300x200.png?text=Car+Image+5" alt="Car Image 5">
            <img src="https://via.placeholder.com/300x200.png?text=Car+Image+6" alt="Car Image 6">
        </div>
        <div class="contact">
            <h2>Contact Me</h2>
            <p>Instagram: <a href="https://instagram.com/Carsbyflo">@Carsbyflo</a></p>
            <p>TikTok: <a href="https://tiktok.com/@Carsbyflo">@Carsbyflo</a></p>
            <p>Phone: <a href="tel:+4915734242016">+49 1573 4242016</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Florian Barall</p>
    </footer>
</body>
</html>
